<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Cahaya Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', 'Nunito', sans-serif;
            background-color: #F5F7FA;
        }

        /* Container utama 16:9 */
        .scene-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            background-color: #eee;
            border: 4px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        /* Gambar Latar Belakang - Layer Paling Bawah */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Hotspot/Tombol - Layer Atas */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 50; /* Memastikan di atas gambar */
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .hotspot:hover {
            transform: translate(-50%, -50%) scale(1.15);
        }

        /* Lingkaran Kuning Berdenyut */
        .pulse-circle {
            width: 35px;
            height: 35px;
            background: #FFD700;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.8); }
            70% { box-shadow: 0 0 0 20px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Default sembunyi */
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            position: relative;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Animasi Sinar */
        .light-ray {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawRay 2s ease-out forwards;
        }

        @keyframes drawRay {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="text-center mb-8">
        <h1 class="text-5xl font-bold text-gray-800">Ayo, mulai petualanganmu!</h1>
        <p class="text-x1 font-medium text-gray-600 mt-2">Klik titik kuning pada gambar untuk mempelajari sifat cahaya.</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="scene-container">
            <img src="cahaya1.png" class="bg-image" alt="Background">

            <div class="hotspot" style="top: 85%; left: 80%;" onclick="openModal('refraction')">
                <div class="pulse-circle"></div>
                <span class="bg-white text-black text-xs font-bold px-2 py-1 rounded shadow mt-2"></span>
            </div>

            <div class="hotspot" style="top: 32%; left: 75%;" onclick="openModal('absorption')">
                <div class="pulse-circle"></div>
                <span class="bg-white text-black text-xs font-bold px-2 py-1 rounded shadow mt-2"></span>
            </div>

            <div class="hotspot" style="top: 68%; left: 40%;" onclick="openModal('reflection')">
                <div class="pulse-circle"></div>
                <span class="bg-white text-black text-xs font-bold px-2 py-1 rounded shadow mt-2"></span>
            </div>

            <div class="hotspot" style="top: 25%; left: 35%;" onclick="openModal('straightRay')">
                <div class="pulse-circle"></div>
                <span class="bg-white text-black text-xs font-bold px-2 py-1 rounded shadow mt-2"></span>
            </div>

            <div class="hotspot" style="top: 18%; left: 57%;" onclick="openModal('dispersion')">
                <div class="pulse-circle"></div>
                <span class="bg-white text-black text-xs font-bold px-2 py-1 rounded shadow mt-2"></span>
            </div>
        </div>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="document.getElementById('modalOverlay').style.display='none'">✕</button>
            
            <h2 id="modalTitle" class="text-2xl font-bold mb-4 text-gray-800"></h2>
            
            <div id="animationContainer" class="mb-2 rounded-xl p-4 border border-gray-200 min-h-[350px] flex items-center justify-center overflow-hidden"></div>
            
            <p id="modalDescription" class="text-gray-700 leading-relaxed px-4 mb-6 text-lg font-medium"></p>

            <div class="flex justify-center border-t pt-4"> 
                <button onclick="replayAnimation()" 
                    class="w-full md:w-auto bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-xl text-sm font-bold shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    🔄 Putar Kembali Animasi
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentActiveId = '';
        const phenomenaData = {
            reflection: {
                title: "Pemantulan Cahaya (Refleksi)",
                description: "Cahaya memantul saat mengenai permukaan bening, seperti air atau cermin. Itulah sebabnya kamu bisa melihat bayangan di danau!",
                animation: createReflectionSVG
            },
            absorption: {
                title: "Cahaya Menembus Benda Bening",
                description: "Cahaya matahari dapat melewati benda-benda transparan atau bening dengan mudah. Contohnya, cahaya bisa menembus dinding kaca transparan ini sehingga tanaman di dalam rumah kaca tetap bisa mendapatkan sinar untuk tumbuh subur!",
                animation: createAbsorptionSVG
            },
            dispersion: {
                title: "Penguraian Cahaya (Dispersi)",
                description: "Cahaya putih matahari sebenarnya terdiri dari banyak warna yang terurai saat melewati tetesan air, membentuk pelangi!",
                animation: createDispersionSVG
            },
            straightRay: {
                title: "Cahaya Merambat Lurus",
                description: "Cahaya matahari akan selalu bergerak mengikuti garis lurus selama melewati satu medium yang sama (seperti udara saja, atau air saja).",
                animation: createStraightRaySVG
            },
            refraction: {
                title: "Pembiasan Cahaya (Refraksi)",
                description: "Cahaya berbelok saat masuk ke medium yang berbeda (dari udara ke air). Inilah yang membuat sedotan terlihat bengkok!",
                animation: createRefractionSVG
            }
        };

        function openModal(id) {
            const sound = document.getElementById('popSound');
                sound.currentTime = 0; // Meriset durasi ke awal agar bisa diputar berulang-ulang dengan cepat
                sound.play();
            currentActiveId = id;
            const data = phenomenaData[id];
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalDescription').innerText = data.description;
            
            const container = document.getElementById('animationContainer');
            container.innerHTML = '';
              if (id === 'dispersion') {
                container.style.backgroundColor = '#1a1a1a'; 
                } else {
                container.style.backgroundColor = '#f9fafb'; 
                }
            container.appendChild(data.animation());
            
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function replayAnimation() {
            if (currentActiveId) {
                const container = document.getElementById('animationContainer');
                const data = phenomenaData[currentActiveId];
        
        // Kosongkan dan isi kembali untuk memicu animasi CSS (drawRay) dari awal
                container.innerHTML = '';
                setTimeout(() => {
                    container.appendChild(data.animation());
                }, 50);
            }
        }
        function closeModal(e) {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Fungsi Animasi SVG Singkat
        function createReflectionSVG() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '300');
            svg.setAttribute('viewBox', '0 0 400 300');
            
            const water = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            water.setAttribute('x', '0');
            water.setAttribute('y', '150');
            water.setAttribute('width', '400');
            water.setAttribute('height', '150');
            water.setAttribute('fill', '#4A90E2');
            water.setAttribute('opacity', '0.3');
            
            const normal = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            normal.setAttribute('x1', '200');
            normal.setAttribute('y1', '50');
            normal.setAttribute('x2', '200');
            normal.setAttribute('y2', '250');
            normal.setAttribute('stroke', '#999');
            normal.setAttribute('stroke-width', '2');
            normal.setAttribute('stroke-dasharray', '5,5');

            incident.setAttribute('y1', '50');

            incident.setAttribute('y2', '150');

            incident.setAttribute('stroke-width', '4');

            incident.setAttribute('marker-end', 'url(#arrowhead)');
            
            const reflected = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            reflected.setAttribute('x1', '200');
            reflected.setAttribute('y1', '150');
            reflected.setAttribute('x2', '300');
            reflected.setAttribute('y2', '50');
            reflected.setAttribute('stroke', '#FFD700');
            reflected.setAttribute('stroke-width', '4');
            reflected.setAttribute('class', 'light-ray');
            reflected.setAttribute('marker-end', 'url(#arrowhead)');
            reflected.style.animationDelay = '0.5s';
            
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '10');
            marker.setAttribute('markerHeight', '10');
            marker.setAttribute('refX', '5');
            marker.setAttribute('refY', '3');
            marker.setAttribute('orient', 'auto');
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '0 0, 10 3, 0 6');
            polygon.setAttribute('fill', '#FFD700');
            marker.appendChild(polygon);
            defs.appendChild(marker);
            
            const labelIncident = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            labelIncident.setAttribute('x', '120');
            labelIncident.setAttribute('y', '80');
            labelIncident.setAttribute('fill', '#333');
            labelIncident.setAttribute('font-size', '16');
            labelIncident.setAttribute('font-weight', 'bold');
            labelIncident.textContent = 'Sinar Datang';
            
            const labelReflected = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            labelReflected.setAttribute('x', '240');
            labelReflected.setAttribute('y', '80');
            labelReflected.setAttribute('fill', '#333');
            labelReflected.setAttribute('font-size', '16');
            labelReflected.setAttribute('font-weight', 'bold');
            labelReflected.textContent = 'Sinar Pantul';
            
            const labelWater = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            labelWater.setAttribute('x', '150');
            labelWater.setAttribute('y', '180');
            labelWater.setAttribute('fill', '#1976D2');
            labelWater.setAttribute('font-size', '20');
            labelWater.setAttribute('font-weight', 'bold');
            labelWater.textContent = '💧 Permukaan air';
            
            const formula = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            formula.setAttribute('x', '120');
            formula.setAttribute('y', '280');
            formula.setAttribute('fill', '#FF6B6B');
            formula.setAttribute('font-size', '22');
            formula.setAttribute('font-weight', 'bold');
            formula.textContent = 'θi = θr (θ datang = θ pantul)';
            
            svg.appendChild(defs);
            svg.appendChild(water);
            svg.appendChild(normal);
            svg.appendChild(incident);
            svg.appendChild(reflected);
            svg.appendChild(labelIncident);
            svg.appendChild(labelReflected);
            svg.appendChild(labelWater);
            svg.appendChild(formula);
            
            return svg;
        }

        function createRefractionSVG() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '300');
            svg.setAttribute('viewBox', '0 0 400 300');

            air.setAttribute('fill', '#E3F2FD');
            air.setAttribute('opacity', '0.5');
            
            const water = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            water.setAttribute('x', '0');
            water.setAttribute('y', '150');
            water.setAttribute('width', '400');
            water.setAttribute('height', '150');
            water.setAttribute('fill', '#4A90E2');
            water.setAttribute('opacity', '0.4');

            interfaceLine.setAttribute('y1', '150');

            normal.setAttribute('y1', '50');
            normal.setAttribute('x2', '200');
            normal.setAttribute('y2', '250');
            normal.setAttribute('stroke', '#999');
            normal.setAttribute('stroke-width', '2');
            normal.setAttribute('stroke-dasharray', '5,5');
            
            const incident = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            incident.setAttribute('x1', '100');
            incident.setAttribute('y1', '50');
            incident.setAttribute('x2', '200');
            incident.setAttribute('y2', '150');
            incident.setAttribute('stroke', '#FFD700');
            incident.setAttribute('stroke-width', '4');
            incident.setAttribute('class', 'light-ray');
            
            const refracted = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            refracted.setAttribute('x1', '200');
            refracted.setAttribute('y1', '150');
            refracted.setAttribute('x2', '230');
            refracted.setAttribute('y2', '250');
            refracted.setAttribute('stroke', '#FFD700');
            refracted.setAttribute('stroke-width', '4');
            refracted.setAttribute('class', 'light-ray');
            refracted.style.animationDelay = '0.5s';
            
            const labelAir = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            labelAir.setAttribute('x', '20');
            labelAir.setAttribute('y', '80');
            labelAir.setAttribute('fill', '#333');
            labelAir.setAttribute('font-size', '18');
            labelAir.setAttribute('font-weight', 'bold');
            labelAir.textContent = '☁️ Udara (cepat)';
            
            const labelWater = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            labelWater.setAttribute('x', '20');
            labelWater.setAttribute('y', '200');
            labelWater.setAttribute('fill', '#1976D2');
            labelWater.setAttribute('font-size', '18');
            labelWater.setAttribute('font-weight', 'bold');
            labelWater.textContent = '💧 Air (lambat)';
            
            const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrow.setAttribute('x', '250');
            arrow.setAttribute('y', '180');
            arrow.setAttribute('fill', '#FF6B6B');
            arrow.setAttribute('font-size', '40');
            arrow.textContent = '↘️';
            
            const note = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            note.setAttribute('x', '100');
            note.setAttribute('y', '280');
            note.setAttribute('fill', '#FF6B6B');
            note.setAttribute('font-size', '20');
            note.setAttribute('font-weight', 'bold');
            note.textContent = 'Cahaya berbelok saat masuk air!';
            
            svg.appendChild(air);
            svg.appendChild(water);
            svg.appendChild(interfaceLine);
            svg.appendChild(normal);
            svg.appendChild(incident);
            svg.appendChild(refracted);
            svg.appendChild(labelAir);
            svg.appendChild(labelWater);
            svg.appendChild(arrow);
            svg.appendChild(note);
            
            return svg;
        }
        function createStraightRaySVG() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '280');
            svg.setAttribute('viewBox', '0 0 600 400');
            
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('width', '600');
            bg.setAttribute('height', '400');
            bg.setAttribute('fill', '#E3F2FD');
            svg.appendChild(bg);
            
            const sun = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            sun.setAttribute('cx', '100');
            sun.setAttribute('cy', '100');
            sun.setAttribute('r', '40');
            sun.setAttribute('fill', '#FFD700');
            svg.appendChild(sun);
            
            const sunGlow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            sunGlow.setAttribute('cx', '100');
            sunGlow.setAttribute('cy', '100');
            sunGlow.setAttribute('r', '50');
            sunGlow.setAttribute('fill', '#FFF9C4');
            sunGlow.setAttribute('opacity', '0.5');
            svg.insertBefore(sunGlow, sun);
            
            const rayPaths = [
                { x2: 300, y2: 200 },
                { x2: 400, y2: 250 },
                { x2: 500, y2: 150 },
                { x2: 350, y2: 100 },
                { x2: 450, y2: 300 }
            ];
            
            rayPaths.forEach((path, i) => {
                const rulerLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                rulerLine.setAttribute('x1', '100');
                rulerLine.setAttribute('y1', '100');
                rulerLine.setAttribute('x2', path.x2);
                rulerLine.setAttribute('y2', path.y2);
                rulerLine.setAttribute('stroke', '#90CAF9');
                rulerLine.setAttribute('stroke-width', '2');
                rulerLine.setAttribute('stroke-dasharray', '5,5');
                rulerLine.setAttribute('opacity', '0.4');
                svg.appendChild(rulerLine);
                
                const ray = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ray.setAttribute('x1', '100');
                ray.setAttribute('y1', '100');
                ray.setAttribute('x2', path.x2);
                ray.setAttribute('y2', path.y2);
                ray.setAttribute('stroke', '#FFD700');
                ray.setAttribute('stroke-width', '6');
                ray.setAttribute('stroke-linecap', 'round');
                ray.setAttribute('class', 'light-ray');
                ray.style.animationDelay = `${i * 0.2}s`;
                svg.appendChild(ray);
                
                const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                particle.setAttribute('r', '8');
                particle.setAttribute('fill', '#FFF9C4');
                particle.setAttribute('opacity', '0.9');
                
                const animateMotion = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
                animateMotion.setAttribute('dur', '2s');
                animateMotion.setAttribute('repeatCount', 'indefinite');
                animateMotion.setAttribute('begin', `${i * 0.2}s`);
                
                const mpath = document.createElementNS('http://www.w3.org/2000/svg', 'mpath');
                const pathId = `ray-path-${i}`;
                
                const motionPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                motionPath.setAttribute('id', pathId);
                motionPath.setAttribute('d', `M 100 100 L ${path.x2} ${path.y2}`);
                motionPath.setAttribute('fill', 'none');
                svg.appendChild(motionPath);
                
                mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'href', `#${pathId}`);
                animateMotion.appendChild(mpath);
                particle.appendChild(animateMotion);
                svg.appendChild(particle);
            });
            
            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', '300');
            title.setAttribute('y', '50');
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#1976D2');
            title.setAttribute('font-size', '28');
            title.setAttribute('font-weight', 'bold');
            title.textContent = '☀️ Cahaya Merambat Lurus!';
            svg.appendChild(title);
            
            const explanation = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            explanation.setAttribute('x', '300');
            explanation.setAttribute('y', '380');
            explanation.setAttribute('text-anchor', 'middle');
            explanation.setAttribute('fill', '#FF6B6B');
            explanation.setAttribute('font-size', '22');
            explanation.setAttribute('font-weight', 'bold');
            explanation.textContent = '📏 Perhatikan: Tidak ada yang bengkok!';
            svg.appendChild(explanation);
            
            return svg;
        }

        function createBaseSVG(content) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 400 250');
            svg.innerHTML = content;
            return svg;
        }
        
        
    </script>
